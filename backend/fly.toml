app = "route-snap-backend"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  OPENAI_MODEL = "gpt-5-mini"
  ALLOWED_ORIGINS = "https://route-snap-frontend.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
